<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sip Sip Personality Quiz, Find Your Sip</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --stomp: #E97A5C;
    --sassy: #E8A4C9;
    --roar: #E8B84A;
    --cream: #F5F0E6;
    --ink: #1a1a1a;
  }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: repeating-linear-gradient(135deg, #f5f0e6 0px, #f5f0e6 20px, #ebe5d9 20px, #ebe5d9 40px);
    min-height: 100vh;
    color: var(--ink);
    overflow-x: hidden;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    animation: fadeIn 0.5s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo {
    text-align: center;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-size: 64px;
    font-weight: 900;
    font-style: italic;
    background: linear-gradient(135deg, var(--stomp), var(--sassy), var(--roar));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
  }
  .tagline {
    text-align: center;
    color: #777;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .intro-text {
    text-align: center;
    font-size: 18px;
    line-height: 1.6;
    color: #444;
    margin-bottom: 32px;
  }
  .start-btn, .next-btn, .restart-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 50px;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .start-btn:hover, .next-btn:hover, .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .progress {
    height: 6px;
    background: #eee;
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--stomp), var(--sassy), var(--roar));
    transition: width 0.4s ease;
    border-radius: 3px;
  }
  .question-num {
    color: #999;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .question {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 24px;
    color: var(--ink);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option {
    background: #faf7f1;
    border: 2px solid transparent;
    padding: 18px 20px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 16px;
    text-align: left;
    transition: all 0.2s;
    font-family: inherit;
    color: var(--ink);
  }
  .option:hover {
    background: #fff;
    border-color: var(--ink);
    transform: translateX(4px);
  }
  .option.selected {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    align-items: center;
  }
  .back-btn {
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    padding: 8px 12px;
  }
  .back-btn:hover { color: var(--ink); }
  .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .next-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Result page */
  .result {
    text-align: center;
    padding: 20px 0;
  }
  .result-label {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 8px;
  }
  .result-name {
    font-size: 56px;
    font-weight: 900;
    font-style: italic;
    margin-bottom: 8px;
    line-height: 1;
  }
  .result-thai {
    font-size: 22px;
    margin-bottom: 24px;
    opacity: 0.85;
  }
  .can-visual {
    width: 180px;
    height: 280px;
    margin: 0 auto 28px;
    border-radius: 90px / 30px;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .can-visual::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,0.3) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.15) 100%);
    border-radius: inherit;
  }
  .can-label {
    color: #fff;
    font-size: 38px;
    font-weight: 900;
    font-style: italic;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    z-index: 2;
  }
  .result-tag {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .result-desc {
    font-size: 16px;
    line-height: 1.7;
    color: #444;
    margin-bottom: 28px;
    text-align: left;
    padding: 20px;
    background: #faf7f1;
    border-radius: 14px;
  }
  .traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .trait {
    background: #f0e9da;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: #555;
  }

  /* Result themes */
  .theme-stomp .can-visual { background: var(--stomp); }
  .theme-stomp .result-tag { background: var(--stomp); }
  .theme-stomp .result-name { color: var(--stomp); }

  .theme-sassy .can-visual { background: var(--sassy); }
  .theme-sassy .result-tag { background: var(--sassy); }
  .theme-sassy .result-name { color: var(--sassy); }

  .theme-roar .can-visual { background: var(--roar); }
  .theme-roar .result-tag { background: var(--roar); }
  .theme-roar .result-name { color: var(--roar); }

  .share-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 14px;
  }
  .share-row button {
    background: transparent;
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
  }
  .share-row button:hover { background: var(--ink); color: #fff; }

  @media (max-width: 600px) {
    .logo h1 { font-size: 48px; }
    .question { font-size: 20px; }
    .card { padding: 28px 20px; }
    .result-name { font-size: 42px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card" id="app"></div>
</div>

<script>
const questions = [
  {
    q: "It's the end of a long day. How does your body feel?",
    options: [
      { text: "Tight, stiff, like I just ran a marathon", drink: "stomp" },
      { text: "Cramping, bloated, just off", drink: "sassy" },
      { text: "Drained, foggy, low energy overall", drink: "roar" },
      { text: "Honestly a mix of all the above", drink: "any" }
    ]
  },
  {
    q: "Pick the activity that calls to you this weekend.",
    options: [
      { text: "Hike, gym session, or a long run", drink: "stomp" },
      { text: "Cozy brunch and a slow walk", drink: "sassy" },
      { text: "Yoga, meditation, or a nap in the sun", drink: "roar" },
      { text: "Dancing the night away", drink: "stomp" }
    ]
  },
  {
    q: "Which animal vibe matches your spirit right now?",
    options: [
      { text: "A wild horse, restless and powerful", drink: "stomp" },
      { text: "A blooming flower, soft but bold", drink: "sassy" },
      { text: "A tiger, calm but ready to roar", drink: "roar" },
      { text: "Something in between, depends on the day", drink: "any" }
    ]
  },
  {
    q: "What's your biggest wellness goal these days?",
    options: [
      { text: "Recover faster after workouts", drink: "stomp" },
      { text: "Smoother monthly cycles, less discomfort", drink: "sassy" },
      { text: "Better blood flow and overall balance", drink: "roar" },
      { text: "Just feel like myself again", drink: "sassy" }
    ]
  },
  {
    q: "Pick a flavor profile that makes you say yes.",
    options: [
      { text: "Bold, citrusy, a little spicy kick", drink: "stomp" },
      { text: "Floral, fruity, soft and pretty", drink: "sassy" },
      { text: "Earthy, herbal, warm and grounding", drink: "roar" },
      { text: "Surprise me, I'm adventurous", drink: "any" }
    ]
  },
  {
    q: "When stress hits, where do you feel it first?",
    options: [
      { text: "My shoulders and back, hello tension", drink: "stomp" },
      { text: "My mood and emotions go sideways", drink: "sassy" },
      { text: "I feel dizzy, tired, or just blah", drink: "roar" },
      { text: "All over, full body shutdown", drink: "any" }
    ]
  },
  {
    q: "What does your morning routine look like?",
    options: [
      { text: "Quick stretch, then I'm out the door moving", drink: "stomp" },
      { text: "Slow start, herbal tea, journaling", drink: "sassy" },
      { text: "Mindful breathing and some light movement", drink: "roar" },
      { text: "Snooze button is my best friend", drink: "any" }
    ]
  },
  {
    q: "Pick a color that feels like you today.",
    options: [
      { text: "Sunset coral, warm and energetic", drink: "stomp" },
      { text: "Soft pink, gentle and feminine", drink: "sassy" },
      { text: "Golden honey, warm and steady", drink: "roar" },
      { text: "All of them, depends on the mood", drink: "any" }
    ]
  },
  {
    q: "Your friends would describe you as the one who is...",
    options: [
      { text: "Always on the go, full of energy", drink: "stomp" },
      { text: "Caring, intuitive, in touch with her body", drink: "sassy" },
      { text: "Grounded, wise, the calm in the storm", drink: "roar" },
      { text: "A little bit of everything depending on the week", drink: "any" }
    ]
  },
  {
    q: "Pick the moment you most want to feel restored.",
    options: [
      { text: "After a tough workout or physical day", drink: "stomp" },
      { text: "During that time of the month", drink: "sassy" },
      { text: "When my body just feels off balance", drink: "roar" },
      { text: "All of the above honestly", drink: "any" }
    ]
  }
];

const drinks = {
  stomp: {
    name: "Stomp & Sip",
    thai: "ม้ากระทืบโรง",
    tag: "Relieve body aches & soreness",
    theme: "stomp",
    desc: "You move through life at full gallop. Whether you're chasing fitness goals, juggling a packed schedule, or just refusing to slow down, your body asks for recovery. Stomp & Sip is the herbal kick that powers your hustle, easing soreness and waking up tired muscles so you can keep stomping forward.",
    traits: ["Energetic", "Driven", "Active", "Bold", "Resilient"]
  },
  sassy: {
    name: "Sassy Sip",
    thai: "สาวสะดึ้ง",
    tag: "Women's Cycle Comfort",
    theme: "sassy",
    desc: "You honor every season your body moves through. Soft when you need to be, fierce when it counts. Sassy Sip is your monthly companion, blending floral and herbal goodness to bring comfort during your cycle. It's the gentle hug in a can that says: you've got this, beautifully.",
    traits: ["Intuitive", "Caring", "Feminine", "Grounded", "Empowered"]
  },
  roar: {
    name: "Roar & Restore",
    thai: "กำลังเสือโคร่ง",
    tag: "Support blood and body balance",
    theme: "roar",
    desc: "Calm on the surface, mighty underneath. You value balance, breath, and the quiet strength of feeling well from the inside out. Roar & Restore supports healthy blood flow and total body balance with warm, herbal roots that help you feel centered, grounded, and ready to roar when life calls for it.",
    traits: ["Balanced", "Mindful", "Steady", "Wise", "Powerful"]
  }
};

let state = {
  step: -1,
  answers: []
};

const app = document.getElementById('app');

function render() {
  if (state.step === -1) renderIntro();
  else if (state.step >= questions.length) renderResult();
  else renderQuestion();
}

function renderIntro() {
  app.innerHTML = `
    <div class="logo"><h1>Sip Sip</h1></div>
    <div class="tagline">Thai Roots, Global Vibe</div>
    <p class="intro-text">
      Three sparkling herbal drinks. Three powers.<br>
      Take this quick quiz to find out which Sip is yours.
    </p>
    <button class="start-btn" onclick="start()">Start The Quiz</button>
  `;
}

function start() {
  state.step = 0;
  state.answers = [];
  render();
}

function renderQuestion() {
  const q = questions[state.step];
  const progress = ((state.step) / questions.length) * 100;
  const selected = state.answers[state.step];
  app.innerHTML = `
    <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
    <div class="question-num">Question ${state.step + 1} of ${questions.length}</div>
    <h2 class="question">${q.q}</h2>
    <div class="options">
      ${q.options.map((o, i) => `
        <button class="option ${selected === i ? 'selected' : ''}" onclick="selectOption(${i})">
          ${o.text}
        </button>
      `).join('')}
    </div>
    <div class="nav">
      <button class="back-btn" onclick="back()" ${state.step === 0 ? 'disabled' : ''}>&larr; Back</button>
      <button class="next-btn" onclick="next()" ${selected === undefined ? 'disabled' : ''}>
        ${state.step === questions.length - 1 ? 'See Result' : 'Next'}
      </button>
    </div>
  `;
}

function selectOption(i) {
  state.answers[state.step] = i;
  render();
}

function next() {
  if (state.answers[state.step] === undefined) return;
  state.step++;
  render();
}

function back() {
  if (state.step > 0) {
    state.step--;
    render();
  }
}

function calculateResult() {
  const tally = { stomp: 0, sassy: 0, roar: 0 };
  state.answers.forEach((idx, qi) => {
    const drink = questions[qi].options[idx].drink;
    if (drink === 'any') {
      tally.stomp += 0.33;
      tally.sassy += 0.33;
      tally.roar += 0.33;
    } else {
      tally[drink]++;
    }
  });
  let max = -1, winner = 'stomp';
  for (let key in tally) {
    if (tally[key] > max) { max = tally[key]; winner = key; }
  }
  return winner;
}

function renderResult() {
  const winner = calculateResult();
  const d = drinks[winner];
  app.innerHTML = `
    <div class="result theme-${d.theme}">
      <div class="result-label">Your Sip Is</div>
      <div class="result-name">${d.name}</div>
      <div class="result-thai">${d.thai}</div>
      <div class="can-visual"><div class="can-label">Sip<br>Sip</div></div>
      <div class="result-tag">${d.tag}</div>
      <p class="result-desc">${d.desc}</p>
      <div class="traits">
        ${d.traits.map(t => `<span class="trait">${t}</span>`).join('')}
      </div>
      <button class="restart-btn" onclick="start()">Take Quiz Again</button>
      <div class="share-row">
        <button onclick="shareResult('${d.name}')">Share My Sip</button>
      </div>
    </div>
  `;
}

function shareResult(name) {
  const text = `I just took the Sip Sip personality quiz and my sip is ${name}! What's yours?`;
  if (navigator.share) {
    navigator.share({ title: 'My Sip Sip Result', text }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('Result copied to clipboard');
    });
  }
}

render();
</script>
</body>
</html>
